# harness.io/skip-file-for-deploy
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: "{{ .Values.name }}-{{ .Values.environment }}-{{ .Values.datacenter }}-certs"
  namespace: "{{ .Values.namespace }}"
  annotations:
    "field.cattle.io/projectId": "{{ .Values.projectId }}"
spec:
  secretName: "{{ .Values.name }}-{{ .Values.environment }}-{{ .Values.datacenter }}-certs"
  duration: 8760h # 1y
  renewBefore: 720h # 30d
  subject:
    countries:
     - "US"
    provinces:
      - "Ohio"
    localities:
      - "Cincinnati"
    organizations:
      - "The Kroger Co."
    organizationalUnits:
      - "Associate Technology"
    commonName: "{{ include "kewm.commonName" . }}"
  dnsNames:
  {{ include "kewm.dnsNames" . | indent 4 }}
issuerRef:
  name: krogerissuer
  kind: KrogerIssuer
  group: certs
